name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: build
        run: go build ./...
      - name: verify plugins load
        run: |
          go build -o /tmp/caddy .
          MODULES=$(/tmp/caddy list-modules)
          for m in pangolin cloudflare rate_limit fs.vfs fs.merge; do
            echo "$MODULES" | grep -q "$m" || { echo "missing module: $m"; exit 1; }
          done
