name: docker

on:
  push:
    branches: [main]
    paths-ignore: ["README.md"]
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if rebuild is needed
        id: check
        run: |
          BASE_DIGEST=$(docker buildx imagetools inspect ghcr.io/hotio/caddy:latest --format '{{json .Manifest}}' | jq -r '.digest')
          echo "base_digest=$BASE_DIGEST" >> "$GITHUB_OUTPUT"

          CADDY_VERSION=$(awk '$1 == "github.com/caddyserver/caddy/v2" {print $2}' go.mod)
          echo "caddy_version=$CADDY_VERSION" >> "$GITHUB_OUTPUT"

          CURRENT_BASE=$(docker buildx imagetools inspect "$IMAGE:latest" \
            --format '{{ index (index .Image "config") "Labels" "io.abs3ntdev.base-digest" }}' 2>/dev/null || echo "none")
          echo "current base: $CURRENT_BASE"
          echo "hotio base:   $BASE_DIGEST"

          if [ "${{ github.event_name }}" != "schedule" ] || [ "$CURRENT_BASE" != "$BASE_DIGEST" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          else
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          pull: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_DIGEST=${{ steps.check.outputs.base_digest }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.check.outputs.caddy_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
